version: 2
updates:
    # Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "monthly"
          time: "06:00"
          timezone: "UTC"
      open-pull-requests-limit: 5
      labels:
          - "actions"
      commit-message:
          prefix: "ci"
      groups:
          actions:
              patterns:
                  - "*"
